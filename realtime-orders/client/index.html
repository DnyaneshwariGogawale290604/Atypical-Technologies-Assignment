<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface-2: #f2f2f7;
      --border: #e5e5ea;
      --text-1: #1d1d1f;
      --text-2: #86868b;
      --text-3: #a1a1a6;
      --brand: #0071e3;
      --green: #34c759;
      --amber: #ff9500;
      --blue: #0071e3;
      --red: #ff3b30;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .topbar {
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .brand {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--text-1);
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 40px 24px 64px;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -1.2px;
      color: var(--text-1);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat {
      background: var(--surface);
      border-radius: 18px;
      padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    .stat-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-number {
      font-size: 36px;
      font-weight: 600;
      letter-spacing: -1.5px;
    }

    .stat-number.total {
      color: var(--text-1);
    }

    .stat-number.pending {
      color: var(--amber);
    }

    .stat-number.shipped {
      color: var(--blue);
    }

    .stat-number.delivered {
      color: var(--green);
    }

    .card {
      background: var(--surface);
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    .card-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 17px;
      font-weight: 600;
      color: var(--text-1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      padding: 12px 24px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    td {
      padding: 16px 24px;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text-1);
    }

    tr:last-child td {
      border-bottom: none;
    }

    .col-id {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-2);
    }

    .col-customer {
      font-weight: 500;
    }

    .badge {
      display: inline-flex;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      background: var(--surface-2);
    }

    .badge.pending {
      color: var(--amber);
      background: rgba(255, 149, 0, 0.1);
    }

    .badge.shipped {
      color: var(--blue);
      background: rgba(0, 113, 227, 0.1);
    }

    .badge.delivered {
      color: var(--green);
      background: rgba(52, 199, 89, 0.1);
    }

    .log-list {
      list-style: none;
      max-height: 360px;
      overflow-y: auto;
      padding: 0;
      margin: 0;
    }

    .log-list li {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 24px;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
    }

    .log-list li:last-child {
      border-bottom: none;
    }

    .log-op {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 4px 10px;
      border-radius: 12px;
      width: 76px;
      text-align: center;
    }

    .log-op.insert {
      color: var(--brand);
      background: rgba(0, 113, 227, 0.1);
    }

    .log-op.update {
      color: var(--amber);
      background: rgba(255, 149, 0, 0.1);
    }

    .log-op.delete {
      color: var(--red);
      background: rgba(255, 59, 48, 0.1);
    }

    .log-op.connect {
      color: var(--green);
      background: rgba(52, 199, 89, 0.1);
    }

    .log-op.snapshot {
      color: var(--text-2);
      background: var(--surface-2);
    }

    .log-time {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-3);
      width: 65px;
    }

    .log-ref {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-3);
      width: 32px;
      text-align: right;
    }

    .log-msg {
      color: var(--text-1);
      font-weight: 500;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    tr.anim-insert {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>

<body>
  <nav class="topbar">
    <div class="brand">Orders</div>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Live Orders</h1>
    </div>

    <div class="stats-grid">
      <div class="stat">
        <div class="stat-label">Total</div>
        <div class="stat-number total" id="stat-total">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Pending</div>
        <div class="stat-number pending" id="stat-pending">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Shipped</div>
        <div class="stat-number shipped" id="stat-shipped">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Delivered</div>
        <div class="stat-number delivered" id="stat-delivered">0</div>
      </div>
    </div>

    <div class="card">
      <table id="orders-table">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Product</th>
            <th>Status</th>
            <th>Updated</th>
          </tr>
        </thead>
        <tbody id="orders-body"></tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-header">Activity Log</div>
      <ul class="log-list" id="log-list"></ul>
    </div>
  </div>

  <script>
    "use strict";

    const orders = new Map();
    const $ = id => document.getElementById(id);
    const ordersBody = $("orders-body");
    const statTotal = $("stat-total");
    const statPending = $("stat-pending");
    const statShipped = $("stat-shipped");
    const statDelivered = $("stat-delivered");
    const logList = $("log-list");

    const socket = io();

    socket.on("connect", () => { addLog("connect", "-", "Connected"); });
    socket.on("disconnect", r => { addLog("connect", "-", "Disconnected"); });

    socket.on("snapshot", rows => {
      orders.clear();
      ordersBody.innerHTML = "";
      const frag = document.createDocumentFragment();
      rows.forEach(row => { orders.set(row.id, row); frag.appendChild(buildRow(row)); });
      ordersBody.appendChild(frag);
      updateStats();
      addLog("snapshot", "-", "Snapshot loaded");
    });

    socket.on("order_update", ({ operation, data }) => {
      switch (operation) {
        case "INSERT":
          orders.set(data.id, data);
          prependRow(data);
          addLog("insert", data.id, `${data.customer_name} ordered ${data.product_name}`);
          break;
        case "UPDATE":
          orders.set(data.id, data);
          refreshRow(data);
          addLog("update", data.id, `Status changed to ${data.status}`);
          break;
        case "DELETE":
          removeRow(data.id);
          orders.delete(data.id);
          addLog("delete", data.id, "Order removed");
          break;
      }
      updateStats();
    });

    function buildRow(order) {
      const tr = document.createElement("tr");
      tr.id = `row-${order.id}`;

      const time = order.updated_at
        ? new Date(order.updated_at).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" })
        : "-";

      const tdId = document.createElement("td");
      tdId.className = "col-id";
      tdId.textContent = order.id;

      const tdCust = document.createElement("td");
      tdCust.className = "col-customer";
      tdCust.textContent = order.customer_name;

      const tdProd = document.createElement("td");
      tdProd.textContent = order.product_name;

      const tdStatus = document.createElement("td");
      const badge = document.createElement("span");
      badge.className = `badge ${order.status}`;
      badge.textContent = order.status.charAt(0).toUpperCase() + order.status.slice(1);
      tdStatus.appendChild(badge);

      const tdTime = document.createElement("td");
      tdTime.className = "col-time";
      tdTime.textContent = time;

      tr.append(tdId, tdCust, tdProd, tdStatus, tdTime);
      return tr;
    }

    function prependRow(order) {
      const tr = buildRow(order);
      tr.classList.add("anim-insert");
      ordersBody.insertBefore(tr, ordersBody.firstChild);
    }

    function refreshRow(order) {
      const existing = document.getElementById(`row-${order.id}`);
      if (!existing) { prependRow(order); return; }
      const newRow = buildRow(order);
      ordersBody.replaceChild(newRow, existing);
    }

    function removeRow(id) {
      const tr = document.getElementById(`row-${id}`);
      if (tr) tr.remove();
    }

    function updateStats() {
      let p = 0, s = 0, d = 0;
      orders.forEach(o => {
        if (o.status === "pending") p++;
        else if (o.status === "shipped") s++;
        else if (o.status === "delivered") d++;
      });
      statTotal.textContent = orders.size;
      statPending.textContent = p;
      statShipped.textContent = s;
      statDelivered.textContent = d;
    }

    function addLog(type, ref, msg) {
      const MAX = 100;
      const li = document.createElement("li");

      const opSpan = document.createElement("span");
      opSpan.className = `log-op ${type}`;
      opSpan.textContent = type.toUpperCase();

      const timeSpan = document.createElement("span");
      timeSpan.className = "log-time";
      timeSpan.textContent = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });

      const refSpan = document.createElement("span");
      refSpan.className = "log-ref";
      refSpan.textContent = ref;

      const msgSpan = document.createElement("span");
      msgSpan.className = "log-msg";
      msgSpan.textContent = msg;

      li.append(opSpan, timeSpan, refSpan, msgSpan);
      logList.insertBefore(li, logList.firstChild);
      while (logList.children.length > MAX) logList.removeChild(logList.lastChild);
    }
  </script>
</body>

</html>
